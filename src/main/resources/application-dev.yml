spring:
  config:
    import: "classpath:env.properties"
  datasource:
    url: "jdbc:postgresql://localhost:5432/${POSTGRES_DB}"
    username: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
    driver-class-name: "org.postgresql.Driver"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret_key: ${application.security.jwt.secret_key}
      expiration: ${application.security.jwt.expiration}
      refresh_token:
        expiration: "${JWT_REFRESH_EXPIRES_IN:7200000}"
      cookie:
        jwt_cookie_name: "${JWT_COOKIE_NAME:jwt_token}"
        jwt_refresh_cookie_name: "${JWT_REFRESH_COOKIE_NAME:jwt_refresh_token}"
        max_age: "${JWT_COOKIE_MAX_AGE:86400}"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-doc
    enabled: true