spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/railway}"
    username: "${SPRING_DATASOURCE_USERNAME:postgres}"
    password: "${SPRING_DATASOURCE_PASSWORD:postgres}"
    driver-class-name: "org.postgresql.Driver"
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      data-source-properties:
        sslmode: require
        ssl: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret_key: "${JWT_SECRET:default-dev-secret-key-change-in-railway-env-32chars}"
      expiration: "${JWT_EXPIRES_IN:3600000}"
      refresh-token:
        expiration: "${JWT_REFRESH_EXPIRES_IN:7200000}"
      cookie:
        jwt_cookie_name: "${JWT_COOKIE_NAME:jwt_token}"
        jwt_refresh_cookie_name: "${JWT_REFRESH_COOKIE_NAME:jwt_refresh_token}"
        max_age: "${JWT_COOKIE_MAX_AGE:86400}"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-doc
    enabled: true

server:
  port: ${PORT:8080}
